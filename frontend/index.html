<!DOCTYPE html>
<html lang="en" class="bg-slate-900 text-white">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property Management LeadGen</title>
    <link rel="stylesheet" href="/src/styles/app.css" />
  </head>
  <body
    x-data="app()"
    x-init="init"
    class="min-h-screen bg-slate-900 text-slate-100 font-sans antialiased"
  >
    <!-- Captcha Modal Overlay (rendered by captchaModal() component) -->
    <div x-data="captchaModal()" x-html="template"></div>

    <!-- Toast notifications -->
    <template x-teleport="body">
      <div class="fixed top-4 right-4 z-[100] flex flex-col gap-2 max-w-sm">
        <template x-for="note in [notification]" :key="note?.id">
          <div
            x-show="note !== null"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-x-4"
            x-transition:enter-end="opacity-100 translate-x-0"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-x-0"
            x-transition:leave-end="opacity-0 translate-x-4"
            class="bg-slate-800 border border-slate-700 rounded-xl shadow-2xl p-4"
          >
            <div class="flex items-start gap-3">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-red-400" x-text="note?.title"></p>
                <p class="text-xs text-slate-400 mt-1" x-text="note?.detail"></p>
                <template x-if="note?.action">
                  <button
                    @click="navigateTo(note.action); dismissNotification()"
                    class="mt-2 text-xs font-medium text-brand-400 hover:text-brand-300 transition-colors"
                  >
                    Open Settings &rarr;
                  </button>
                </template>
              </div>
              <button @click="dismissNotification()" class="text-slate-500 hover:text-white transition-colors shrink-0">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
            <p class="text-[10px] text-slate-600 mt-2" x-text="note?.timestamp"></p>
          </div>
        </template>
      </div>
    </template>

    <!-- Setup hint banner -->
    <template x-if="showSetupHint">
      <div class="bg-amber-500/10 border-b border-amber-500/20 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-amber-400 text-lg">&#9888;</span>
          <div>
            <p class="text-sm font-medium text-amber-300">Getting Started</p>
            <p class="text-xs text-amber-400/70">Configure your LLM provider and target county in Settings to get started.</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button
            @click="navigateTo('settings')"
            class="px-3 py-1.5 rounded-lg bg-amber-500/20 hover:bg-amber-500/30 text-amber-300 text-xs font-medium transition-colors"
          >
            Open Settings
          </button>
          <button @click="dismissHint()" class="text-amber-400/50 hover:text-amber-300 transition-colors p-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>
    </template>

    <!-- No-LLM warning banner -->
    <template x-if="!hasLLMProvider && hasSidecar && !showSetupHint">
      <div class="bg-amber-500/5 border-b border-amber-500/10 px-6 py-2 flex items-center gap-2">
        <span class="text-amber-400/70 text-sm">&#9888;</span>
        <p class="text-xs text-amber-400/60">
          No LLM provider configured. Some features are disabled.
          <button @click="navigateTo('settings')" class="text-amber-400 hover:text-amber-300 underline ml-1">Configure</button>
        </p>
      </div>
    </template>

    <!-- No-sidecar warning -->
    <template x-if="!hasSidecar">
      <div class="bg-red-500/10 border-b border-red-500/20 px-6 py-2 flex items-center gap-2">
        <span class="text-red-400 text-sm">&#9888;</span>
        <p class="text-xs text-red-400/60">
          Sidecar not connected. Running in development mock mode.
        </p>
      </div>
    </template>

    <!-- Navigation sidebar -->
    <div class="flex h-screen">
      <!-- Sidebar -->
      <aside class="w-56 bg-slate-800 border-r border-slate-700 flex flex-col shrink-0">
        <div class="px-5 py-6 border-b border-slate-700">
          <h1 class="text-lg font-bold text-brand-400 tracking-tight">LeadGen</h1>
          <p class="text-xs text-slate-500 mt-0.5">Property Management</p>
        </div>
        <nav class="flex-1 px-3 py-4 space-y-1">
          <a
            href="#"
            @click.prevent="currentView = 'dashboard'"
            :class="currentView === 'dashboard' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-700/50'"
            class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
            Dashboard
          </a>
          <a
            href="#"
            @click.prevent="currentView = 'leads'"
            :class="currentView === 'leads' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-700/50'"
            class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Leads
          </a>
          <a
            href="#"
            @click.prevent="currentView = 'settings'"
            :class="currentView === 'settings' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-700/50'"
            class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            Settings
          </a>
        </nav>
        <div class="px-5 py-4 border-t border-slate-700 text-xs text-slate-600">
          v0.1.0
        </div>
      </aside>

      <!-- Main content -->
      <main class="flex-1 overflow-y-auto p-6">
        <template x-if="currentView === 'dashboard'">
          <div x-data="dashboard()" x-html="template">
            <div x-init="init"></div>
          </div>
        </template>
        <template x-if="currentView === 'leads'">
          <div x-data="leadTable()" x-html="template">
            <div x-init="init"></div>
          </div>
        </template>
        <template x-if="currentView === 'settings'">
          <div x-data="settingsPanel()" x-html="template">
            <div x-init="init"></div>
          </div>
        </template>
      </main>
    </div>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
