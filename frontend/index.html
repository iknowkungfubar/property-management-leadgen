<!DOCTYPE html>
<html lang="en" class="bg-slate-900 text-white">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property Management LeadGen</title>
    <link rel="stylesheet" href="/src/styles/app.css" />
  </head>
  <body
    x-data="app()"
    x-init="init"
    class="min-h-screen bg-slate-900 text-slate-100 font-sans antialiased"
  >
    <!-- Captcha Modal Overlay -->
    <div x-data="captchaModal()" x-html="template"></div>

    <!-- ── Notification stack (teleported to body) ──────────────────── -->
    <template x-teleport="body">
      <div class="fixed top-4 right-4 z-[100] flex flex-col gap-2 max-w-sm w-full pointer-events-none">
        <template x-for="note in notifications" :key="note.id">
          <div
            class="notification-card pointer-events-auto shadow-2xl border border-slate-700 rounded-xl p-4"
            :class="'notification-' + note.type"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-x-8"
            x-transition:enter-end="opacity-100 translate-x-0"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-x-0"
            x-transition:leave-end="opacity-0 translate-x-8"
          >
            <div class="flex items-start gap-3">
              <!-- Icon -->
              <template x-if="note.type === 'success'">
                <svg class="notification-icon w-5 h-5 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </template>
              <template x-if="note.type === 'error'">
                <svg class="notification-icon w-5 h-5 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </template>
              <template x-if="note.type === 'warning'">
                <svg class="notification-icon w-5 h-5 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                </svg>
              </template>
              <template x-if="note.type === 'info'">
                <svg class="notification-icon w-5 h-5 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </template>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-white" x-text="note.title"></p>
                <p class="text-xs text-slate-400 mt-1" x-text="note.detail"></p>
                <template x-if="note.action">
                  <button
                    @click="navigateTo(note.action); dismissNotification(note.id)"
                    class="mt-2 text-xs font-medium text-brand-400 hover:text-brand-300 transition-colors"
                  >
                    Open Settings &rarr;
                  </button>
                </template>
              </div>
              <button
                @click="dismissNotification(note.id)"
                class="text-slate-500 hover:text-white transition-colors shrink-0"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
            <p class="text-[10px] text-slate-600 mt-2" x-text="note.timestamp"></p>
          </div>
        </template>
      </div>
    </template>

    <!-- ── Setup hint banner ────────────────────────────────────────── -->
    <template x-if="showSetupHint">
      <div class="bg-amber-500/10 border-b border-amber-500/20 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-amber-400 text-lg">&#9888;</span>
          <div>
            <p class="text-sm font-medium text-amber-300">Getting Started</p>
            <p class="text-xs text-amber-400/70">Configure your LLM provider and target county in Settings to get started.</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button
            @click="navigateTo('settings')"
            class="px-3 py-1.5 rounded-lg bg-amber-500/20 hover:bg-amber-500/30 text-amber-300 text-xs font-medium transition-colors"
          >
            Open Settings
          </button>
          <button @click="dismissHint()" class="text-amber-400/50 hover:text-amber-300 transition-colors p-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>
    </template>

    <!-- ── No-LLM warning banner ────────────────────────────────────── -->
    <template x-if="!hasLLMProvider && hasSidecar && !showSetupHint">
      <div class="bg-amber-500/5 border-b border-amber-500/10 px-6 py-2 flex items-center gap-2">
        <span class="text-amber-400/70 text-sm">&#9888;</span>
        <p class="text-xs text-amber-400/60">
          No LLM provider configured. Some features are disabled.
          <button @click="navigateTo('settings')" class="text-amber-400 hover:text-amber-300 underline ml-1">Configure</button>
        </p>
      </div>
    </template>

    <!-- ── No-sidecar warning ───────────────────────────────────────── -->
    <template x-if="!hasSidecar">
      <div class="bg-red-500/10 border-b border-red-500/20 px-6 py-2 flex items-center gap-2">
        <span class="text-red-400 text-sm">&#9888;</span>
        <p class="text-xs text-red-400/60">Sidecar not connected. Running in development mock mode.</p>
      </div>
    </template>

    <!-- ── Main layout ──────────────────────────────────────────────── -->
    <div class="flex min-h-screen">
      <!-- Mobile sidebar backdrop -->
      <div
        x-show="sidebarOpen"
        @click="closeSidebar()"
        class="fixed inset-0 z-30 bg-black/60 backdrop-blur-sm md:hidden"
        x-transition:enter="transition-opacity ease-out duration-250"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition-opacity ease-in duration-200"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
      ></div>

      <!-- Sidebar -->
      <aside
        class="w-56 bg-slate-800 border-r border-slate-700 flex flex-col shrink-0
               fixed inset-y-0 left-0 z-40 -translate-x-full
               md:relative md:translate-x-0
               transition-transform duration-250 ease-in-out"
        :class="{ 'translate-x-0': sidebarOpen }"
      >
        <!-- Logo area -->
        <div class="px-5 py-6 border-b border-slate-700 flex items-center justify-between">
          <div>
            <h1 class="text-lg font-bold text-brand-400 tracking-tight">LeadGen</h1>
            <p class="text-xs text-slate-500 mt-0.5">Property Management</p>
          </div>
          <!-- Mobile close button -->
          <button
            @click="closeSidebar()"
            class="md:hidden text-slate-500 hover:text-white transition-colors p-1"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-3 py-4 space-y-1">
          <!-- Dashboard -->
          <a
            href="#"
            @click.prevent="viewDashboard()"
            :class="currentView === 'dashboard'
              ? 'bg-slate-700 text-white border-l-2 border-brand-500'
              : 'text-slate-400 hover:text-white hover:bg-slate-700/50 border-l-2 border-transparent'"
            class="flex items-center gap-3 px-3 py-2 text-sm transition-colors rounded-r-lg ml-0"
          >
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
            </svg>
            <span class="flex-1">Dashboard</span>
            <kbd class="hidden md:inline-flex text-[10px] text-slate-600 bg-slate-900/50 px-1.5 py-0.5 rounded border border-slate-700 font-mono">Ctrl+D</kbd>
          </a>

          <!-- Leads -->
          <a
            href="#"
            @click.prevent="viewLeads()"
            :class="currentView === 'leads'
              ? 'bg-slate-700 text-white border-l-2 border-brand-500'
              : 'text-slate-400 hover:text-white hover:bg-slate-700/50 border-l-2 border-transparent'"
            class="flex items-center gap-3 px-3 py-2 text-sm transition-colors rounded-r-lg ml-0"
          >
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <span class="flex-1">Leads</span>
            <template x-if="totalLeads > 0">
              <span class="inline-flex items-center justify-center min-w-[20px] h-5 px-1.5 rounded-full bg-brand-500/20 text-brand-400 text-[10px] font-semibold" x-text="totalLeads"></span>
            </template>
            <kbd class="hidden md:inline-flex text-[10px] text-slate-600 bg-slate-900/50 px-1.5 py-0.5 rounded border border-slate-700 font-mono">Ctrl+L</kbd>
          </a>

          <!-- Settings -->
          <a
            href="#"
            @click.prevent="viewSettings()"
            :class="currentView === 'settings'
              ? 'bg-slate-700 text-white border-l-2 border-brand-500'
              : 'text-slate-400 hover:text-white hover:bg-slate-700/50 border-l-2 border-transparent'"
            class="flex items-center gap-3 px-3 py-2 text-sm transition-colors rounded-r-lg ml-0"
          >
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <span class="flex-1">Settings</span>
            <kbd class="hidden md:inline-flex text-[10px] text-slate-600 bg-slate-900/50 px-1.5 py-0.5 rounded border border-slate-700 font-mono">Ctrl+,</kbd>
          </a>
        </nav>

        <!-- Version footer -->
        <div class="px-5 py-4 border-t border-slate-700 text-xs text-slate-600">
          v0.1.0
        </div>
      </aside>

      <!-- Main content area -->
      <main class="flex-1 overflow-y-auto min-h-screen" :class="{ 'md:ml-0': true }">
        <!-- Mobile header bar -->
        <div class="md:hidden flex items-center gap-3 px-4 py-3 border-b border-slate-700 bg-slate-800/50 backdrop-blur-sm">
          <button
            @click="toggleSidebar()"
            class="text-slate-400 hover:text-white transition-colors p-1"
          >
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
          <h1 class="text-sm font-semibold text-brand-400">LeadGen</h1>
        </div>

        <!-- Content panes -->
        <div class="p-4 md:p-6">
          <template x-if="currentView === 'dashboard'">
            <div x-data="dashboard()" x-html="template">
              <div x-init="init"></div>
            </div>
          </template>
          <template x-if="currentView === 'leads'">
            <div x-data="leadTable()" x-html="template">
              <div x-init="init"></div>
            </div>
          </template>
          <template x-if="currentView === 'settings'">
            <div x-data="settingsPanel()" x-html="template">
              <div x-init="init"></div>
            </div>
          </template>
        </div>
      </main>
    </div>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
