<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Accent glow -->
  <rect x="0" y="0" width="600" height="400" fill="url(#glow)" rx="12"/>

  <!-- Left side: Icon area -->
  <g transform="translate(80, 100)">
    <!-- House/building icon -->
    <rect x="0" y="60" width="60" height="80" rx="4" fill="#1e293b" stroke="#818cf8" stroke-width="2"/>
    <polygon points="30,10 60,40 0,40" fill="#6366f1"/>
    <rect x="15" y="100" width="12" height="40" rx="2" fill="#334155"/>
    <rect x="35" y="80" width="18" height="18" rx="2" fill="#334155"/>

    <!-- Leads/bars icon -->
    <g transform="translate(90, 20)">
      <rect x="0" y="30" width="12" height="50" rx="2" fill="#6366f1" opacity="0.6"/>
      <rect x="18" y="15" width="12" height="65" rx="2" fill="#818cf8" opacity="0.8"/>
      <rect x="36" y="0" width="12" height="80" rx="2" fill="#a5b4fc"/>
    </g>

    <!-- Magnifying glass -->
    <g transform="translate(130, 50)" filter="url(#softGlow)">
      <circle cx="20" cy="20" r="16" fill="none" stroke="#818cf8" stroke-width="3"/>
      <line x1="32" y1="32" x2="44" y2="44" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Right side: Text area -->
  <g transform="translate(380, 100)">
    <!-- Title -->
    <text x="0" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">
      Property Management
    </text>
    <text x="0" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="url(#accent)" letter-spacing="-0.5">
      LeadGen
    </text>

    <!-- Subtitle -->
    <text x="0" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="0.3">
      Agentic lead generation for property management professionals
    </text>

    <!-- Tags -->
    <g transform="translate(0, 145)">
      <rect x="0" y="0" width="80" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="40" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Tauri v2</text>

      <rect x="90" y="0" width="85" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="132" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Python Sidecar</text>

      <rect x="185" y="0" width="72" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="221" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">SQLite</text>

      <rect x="267" y="0" width="70" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="302" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Alpine.js</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="40" y="340" width="1120" height="2" fill="url(#accent)" opacity="0.3"/>

  <!-- Stats row -->
  <g transform="translate(40, 355)">
    <text x="0" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">
      <tspan fill="#818cf8">●</tspan> 121 tests
    </text>
    <text x="120" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">
      <tspan fill="#34d399">●</tspan> 59% coverage
    </text>
    <text x="250" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">
      <tspan fill="#6366f1">●</tspan> 0 lint errors
    </text>
    <text x="380" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">
      <tspan fill="#f59e0b">●</tspan> CI/CD ready
    </text>
  </g>
</svg>
